<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
    }
    h3 { margin: 0 0 12px 0; font-size: 15px; }
    #status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      text-align: center;
    }
    .info { background: #e8f4fd; color: #1a5276; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .working { background: #fff3cd; color: #856404; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90d9;
      color: white;
      margin-bottom: 8px;
    }
    button:hover { background: #357abd; }
    button:disabled { background: #ccc; cursor: default; }
    button.secondary {
      background: #6c757d;
    }
    button.secondary:hover { background: #545b62; }
    #tokenBox {
      width: 100%;
      height: 60px;
      font-size: 10px;
      font-family: monospace;
      margin-bottom: 8px;
      display: none;
      box-sizing: border-box;
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>Transcriptonator</h3>
  <div id="status" class="info">Ready to grab your PLAUD token.</div>
  <button id="sendBtn">Send Token to App</button>
  <textarea id="tokenBox" readonly></textarea>
  <button id="copyBtn" class="secondary" style="display:none">Copy Token to Clipboard</button>
  <div class="hint">
    Make sure you're logged in to <b>web.plaud.ai</b> and Transcriptonator is running.
  </div>
  <script src="popup.js"></script>
</body>
</html>
